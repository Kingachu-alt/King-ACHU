<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING ACHU | Music</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #070707;
            --card-bg: rgba(18, 18, 18, 0.8);
            --text-main: #ffffff;
            --text-sub: #888888;
            --brand-yellow: #e2f700;
            
            /* Clean platform branding overrides */
            --spotify-color: #1DB954;
            --youtube-color: #FF0000;
            --tidal-color: #00E5FF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background: radial-gradient(circle at top right, rgba(226, 247, 0, 0.05), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(255, 255, 255, 0.02), transparent 50%),
                        #070707;
        }

        /* PREMIUM NAVIGATION BAR */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 8%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent);
            width: 100%;
            z-index: 100;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--brand-yellow);
        }

        nav {
            display: flex;
            gap: 50px;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            padding: 5px 0;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        nav a:hover {
            opacity: 1;
        }

        nav a.active {
            opacity: 1;
            color: var(--text-main);
        }

        /* Clean underline indicator for the active page */
        nav a.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--brand-yellow);
        }

        /* HIGH-END MUSIC CONTAINER */
        .content-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .music-container {
            width: 100%;
            max-width: 500px;
            text-align: center;
            background: var(--card-bg);
            padding: 40px 35px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        /* NEW MUSIC BANNER STYLE */
        .music-banner {
            width: 100%;
            height: 180px;
            border-radius: 14px;
            margin-bottom: 35px;
            overflow: hidden;
            background: linear-gradient(135deg, #111 0%, #222 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* This handles a real artwork image later. Just swap the image URL */
        .banner-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0.8;
        }

        .banner-overlay-text {
            position: relative;
            z-index: 2;
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 4px 15px rgba(0,0,0,0.9);
            color: #fff;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .release-subtitle {
            font-size: 0.8rem;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 35px;
        }

        /* PLATFORM ROW LAYOUT */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .platform-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 28px;
            border-radius: 14px;
            text-decoration: none;
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .platform-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .platform-link i {
            font-size: 1.3rem;
        }

        /* Custom SVG sizing for Tidal icon */
        .tidal-svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .platform-name {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .btn-action {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 8px 18px;
            border-radius: 30px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.25s ease;
        }

        /* Hover animations with subtle brand glows */
        .platform-link.spotify:hover {
            background: rgba(29, 185, 84, 0.1);
            border-color: var(--spotify-color);
            box-shadow: 0 0 20px rgba(29, 185, 84, 0.15);
        }
        .platform-link.spotify:hover .btn-action {
            background: var(--spotify-color);
            border-color: var(--spotify-color);
            color: #000;
        }

        .platform-link.youtube:hover {
            background: rgba(255, 0, 0, 0.1);
            border-color: var(--youtube-color);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.15);
        }
        .platform-link.youtube:hover .btn-action {
            background: var(--youtube-color);
            border-color: var(--youtube-color);
            color: #fff;
        }

        .platform-link.tidal:hover {
            background: rgba(0, 229, 255, 0.05);
            border-color: var(--tidal-color);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
        }
        .platform-link.tidal:hover .btn-action {
            background: var(--tidal-color);
            border-color: var(--tidal-color);
            color: #000;
        }

        /* FOOTER STYLE */
        footer {
            text-align: center;
            padding: 30px 20px;
            font-size: 0.75rem;
            color: var(--text-sub);
            letter-spacing: 1px;
            text-transform: uppercase;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            background: rgba(0, 0, 0, 0.2);
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            header { padding: 30px 5%; flex-direction: column; gap: 25px; }
            nav { gap: 30px; }
            .music-container { padding: 35px 20px; }
            .music-banner { height: 140px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">KING <span>ACHU</span></div>
        <nav>
            <a href="index.html">Home</a>
            <a href="music.html" class="active">Music</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <div class="content-wrapper">
        <div class="music-container">
            
            <div class="music-banner">
                <img class="banner-img" src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=1000" alt="New Release">
                <div class="banner-overlay-text">NEW RELEASE</div>
            </div>
            
            <h1>Listen Now</h1>
            <div class="release-subtitle">Select your platform</div>

            <div class="links-list">
                
                <a href="YOUR_SPOTIFY_LINK" class="platform-link spotify" target="_blank">
                    <div class="platform-left">
                        <i class="fa-brands fa-spotify" style="color: var(--spotify-color);"></i>
                        <span class="platform-name">Spotify</span>
                    </div>
                    <span class="btn-action">Play</span>
                </a>

                <a href="YOUR_YOUTUBE_LINK" class="platform-link youtube" target="_blank">
                    <div class="platform-left">
                        <i class="fa-brands fa-youtube" style="color: var(--youtube-color);"></i>
                        <span class="platform-name">YouTube</span>
                    </div>
                    <span class="btn-action">Watch</span>
                </a>

                <a href="YOUR_TIDAL_LINK" class="platform-link tidal" target="_blank">
                    <div class="platform-left">
                        <svg class="tidal-svg" viewBox="0 0 24 24">
                            <path d="M12 5.374L7.363 10 12 14.626 16.637 10 12 5.374zM7.363 10L2.725 14.626 7.363 19.25 12 14.626 7.363 10zm9.274 0L12 14.626l4.637 4.624 4.638-4.624L16.637 10z"/>
                        </svg>
                        <span class="platform-name">Tidal</span>
                    </div>
                    <span class="btn-action">Listen</span>
                </a>

            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 KING ACHU. ALL RIGHTS RESERVED.</p>
    </footer>

</body>
</html>
